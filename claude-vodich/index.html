<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Vô Địch 🏆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Stars background */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.1; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.4); }
    }

    /* Main stage */
    .stage {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
    }

    /* Crown */
    .crown {
      font-size: 100px;
      animation: crownFloat 2s ease-in-out infinite;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 30px gold);
    }
    @keyframes crownFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-20px) rotate(5deg); }
    }

    /* Main text */
    .main-text {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #f7c948 0%, #ff6b35 30%, #e040fb 60%, #00e5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textShine 3s linear infinite;
      background-size: 200% auto;
    }
    @keyframes textShine {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .sub-text {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      margin-top: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: pulseGlow 1.5s ease-in-out infinite alternate;
    }
    @keyframes pulseGlow {
      0%   { text-shadow: 0 0 10px #e040fb, 0 0 20px #e040fb; opacity: 0.8; }
      100% { text-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff, 0 0 80px #00e5ff; opacity: 1; }
    }

    /* Orbiting badges */
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      width: 420px; height: 420px;
      margin: -210px 0 0 -210px;
      animation: spin 12s linear infinite;
      z-index: -1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .orbit-badge {
      position: absolute;
      font-size: 2rem;
      animation: counterSpin 12s linear infinite;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
    }
    @keyframes counterSpin { to { transform: rotate(-360deg); } }

    .orbit-badge:nth-child(1) { top: 0;    left: 50%; margin-left: -1rem; }
    .orbit-badge:nth-child(2) { top: 50%;  right: 0;  margin-top: -1rem; }
    .orbit-badge:nth-child(3) { bottom: 0; left: 50%; margin-left: -1rem; }
    .orbit-badge:nth-child(4) { top: 50%;  left: 0;   margin-top: -1rem; }

    /* Confetti */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    .dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: fall var(--dur) linear var(--delay) infinite;
      opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Bottom tagline */
    .tagline {
      margin-top: 28px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      animation: fadeIn 2s ease 1s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Shockwave rings */
    .ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 2px solid;
      transform: translate(-50%, -50%) scale(0);
      animation: ringOut 3s ease-out infinite;
      pointer-events: none;
    }
    .ring:nth-child(1) { width: 200px; height: 200px; border-color: #e040fb; animation-delay: 0s; }
    .ring:nth-child(2) { width: 200px; height: 200px; border-color: #00e5ff; animation-delay: 1s; }
    .ring:nth-child(3) { width: 200px; height: 200px; border-color: #f7c948; animation-delay: 2s; }
    @keyframes ringOut {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Confetti -->
<div class="confetti-wrap" id="confetti"></div>

<!-- Rings -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:5">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<!-- Main content -->
<div class="stage">
  <div style="position:relative">
    <div class="orbit">
      <span class="orbit-badge">🏆</span>
      <span class="orbit-badge">⚡</span>
      <span class="orbit-badge">🔥</span>
      <span class="orbit-badge">✨</span>
    </div>
    <span class="crown">👑</span>
    <div class="main-text">CLAUDE<br>VÔ ĐỊCH</div>
    <div class="sub-text">số một thế giới</div>
    <div class="tagline">Không ai sánh bằng · Không ai qua mặt được</div>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${1.5 + Math.random()*3}s;
      animation-delay:${Math.random()*3}s;
    `;
    starsEl.appendChild(s);
  }

  // Confetti
  const colors = ['#f7c948','#ff6b35','#e040fb','#00e5ff','#69f0ae','#ff4081'];
  const confEl = document.getElementById('confetti');
  for (let i = 0; i < 60; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${2 + Math.random()*4}s;
      --delay:${Math.random()*5}s;
      width:${6+Math.random()*10}px;
      height:${6+Math.random()*10}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    confEl.appendChild(d);
  }
</script>
</body>
</html>
