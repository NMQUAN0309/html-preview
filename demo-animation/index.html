<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lobster Party 🦞</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 {
    color: #fff;
    font-size: clamp(1.5rem, 5vw, 3rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #ff4466, 0 0 20px #ff4466; }
    to   { text-shadow: 0 0 20px #ff88aa, 0 0 40px #ff4466, 0 0 60px #ff2255; }
  }

  p.sub {
    color: #ff6688;
    font-size: 0.9rem;
    letter-spacing: 2px;
    margin-bottom: 40px;
    opacity: 0.8;
  }

  /* Floating lobsters */
  .lobster {
    position: fixed;
    font-size: 2rem;
    animation: float linear infinite;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 0 6px #ff4466);
  }

  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Pulse ring */
  .ring-container {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid #ff4466;
    animation: pulse 2.5s ease-out infinite;
    opacity: 0;
  }

  .ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
  .ring:nth-child(2) { width: 80%; height: 80%; animation-delay: 0.6s; }
  .ring:nth-child(3) { width: 60%; height: 60%; animation-delay: 1.2s; }

  @keyframes pulse {
    0%   { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .center-emoji {
    font-size: 4rem;
    animation: spin 4s linear infinite;
    filter: drop-shadow(0 0 12px #ff4466);
    z-index: 1;
  }

  @keyframes spin {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Particle canvas */
  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; text-align: center; }

  /* Click button */
  .btn {
    padding: 12px 32px;
    background: transparent;
    border: 2px solid #ff4466;
    color: #ff4466;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: #ff4466;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
    opacity: 0.3;
  }

  .btn:hover { color: #fff; box-shadow: 0 0 20px #ff4466; }
  .btn:hover::before { width: 300px; height: 300px; }
  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="ring-container">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <span class="center-emoji">🦞</span>
  </div>
  <h1>Lobster Party</h1>
  <p class="sub">made by claw · 2026</p>
  <button class="btn" onclick="boom()">Drop the lobsters</button>
</div>

<script>
// Particle canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.r = Math.random() * 2 + 0.5;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.alpha = Math.random() * 0.5 + 0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 68, 102, ${this.alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

// Floating lobsters
function spawnLobster() {
  const el = document.createElement('div');
  el.className = 'lobster';
  el.textContent = '🦞';
  el.style.left = Math.random() * 95 + 'vw';
  el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
  const dur = Math.random() * 5 + 5;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = '0s';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}

setInterval(spawnLobster, 800);

// Boom: rain of lobsters
function boom() {
  for (let i = 0; i < 20; i++) setTimeout(spawnLobster, i * 100);
}
</script>
</body>
</html>
